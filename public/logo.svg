<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="lens" x1="14" y1="12" x2="28" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>
  <!-- Rounded square base -->
  <rect width="40" height="40" rx="10" fill="url(#bg)"/>
  <!-- Camera body -->
  <rect x="8" y="13" width="24" height="18" rx="4" fill="rgba(255,255,255,0.2)"/>
  <!-- Flash/viewfinder -->
  <rect x="15" y="9" width="10" height="5" rx="2" fill="rgba(255,255,255,0.25)"/>
  <!-- Lens outer -->
  <circle cx="20" cy="22" r="7" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  <!-- Lens inner -->
  <circle cx="20" cy="22" r="4.5" fill="url(#lens)" opacity="0.9"/>
  <!-- Lens highlight -->
  <circle cx="18" cy="20" r="1.5" fill="white" opacity="0.7"/>
  <!-- Lab flask hint - small bubbles -->
  <circle cx="28" cy="14" r="1" fill="rgba(255,255,255,0.5)"/>
  <circle cx="30" cy="16" r="0.7" fill="rgba(255,255,255,0.4)"/>
  <circle cx="29" cy="12" r="0.5" fill="rgba(255,255,255,0.3)"/>
</svg>
